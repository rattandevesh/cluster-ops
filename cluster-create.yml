---
- name: Create kOps Cluster
  hosts: localhost
  gather_facts: false
  vars:
    environment: "{{ lookup('env', 'ENVIRONMENT') | default('dev', true) }}"
    cluster_name: "{{ lookup('env', 'CLUSTER_NAME') | default('dev.cluster.example.internal', true) }}"
    region: "{{ lookup('env', 'AWS_REGION') | default('us-east-1', true) }}"
    # Pinned: 1.28.x is stable and supported by cert-manager, NGINX ingress, and metrics-server
    k8s_version: "{{ lookup('env', 'K8S_VERSION') | default('1.28.0', true) }}"
    vpc_id: "{{ lookup('env', 'VPC_ID') }}"
    private_subnet_ids: "{{ lookup('env', 'PRIVATE_SUBNET_IDS').split(',') }}"
    public_subnet_ids: "{{ lookup('env', 'PUBLIC_SUBNET_IDS').split(',') }}"
    hosted_zone_id: "{{ lookup('env', 'HOSTED_ZONE_ID') }}"
    kms_key_arn: "{{ lookup('env', 'KMS_KEY_ARN') }}"
    node_instance_profile: "{{ lookup('env', 'NODE_INSTANCE_PROFILE_NAME') | default(lookup('env', 'NODE_INSTANCE_PROFILE_ARN') | default('', true), true) }}"

  tasks:
    - name: Validate required Terraform inputs
      assert:
        that:
          - vpc_id | length > 0
          - hosted_zone_id | length > 0
          - kms_key_arn | length > 0
        fail_msg: "Set VPC_ID, HOSTED_ZONE_ID, and KMS_KEY_ARN from Terraform outputs"

    - name: Create kOps state bucket
      command: >
        aws s3api create-bucket
        --bucket {{ cluster_name }}-state
        --region {{ region }}
        {% if region != 'us-east-1' %}
        --create-bucket-configuration LocationConstraint={{ region }}
        {% endif %}
      ignore_errors: true

    - name: Export KOPS_STATE_STORE
      set_fact:
        kops_state_store: "s3://{{ cluster_name }}-state"

    - name: Generate kOps cluster manifest
      command: >
        kops create cluster
        --name={{ cluster_name }}
        --state={{ kops_state_store }}
        --zones={{ region }}a,{{ region }}b,{{ region }}c
        --node-count=3
        --node-size=t3.medium
        --control-plane-size=t3.medium
        --control-plane-count=3
        --networking=calico
        --topology=private
        --bastion
        --cloud=aws
        --network-id={{ vpc_id }}
        --dns-zone={{ hosted_zone_id }}
        --kubernetes-version={{ k8s_version }}
        --encrypt-etcd-storage
        --dry-run
        -o yaml
      register: cluster_manifest

    - name: Write cluster manifest to file
      copy:
        content: "{{ cluster_manifest.stdout }}"
        dest: "/tmp/{{ cluster_name }}.yaml"

    - name: Apply cluster manifest
      command: >
        kops create -f /tmp/{{ cluster_name }}.yaml
        --state={{ kops_state_store }}

    - name: Create spot instance group manifest
      copy:
        dest: "/tmp/{{ cluster_name }}-spot-ig.yaml"
        content: |
          apiVersion: kops.k8s.io/v1alpha2
          kind: InstanceGroup
          metadata:
            name: spot-nodes
            labels:
              kops.k8s.io/cluster: {{ cluster_name }}
          spec:
            role: Node
            minSize: 1
            maxSize: 6
            machineType: t3.medium
            maxPrice: "0.05"
            subnets:
          {% for subnet in private_subnet_ids %}
              - {{ subnet }}
          {% endfor %}

    - name: Apply spot instance group
      command: >
        kops create -f /tmp/{{ cluster_name }}-spot-ig.yaml
        --state={{ kops_state_store }}
      ignore_errors: true

    - name: Update cluster
      command: >
        kops update cluster
        --name={{ cluster_name }}
        --state={{ kops_state_store }}
        --yes

    - name: Rolling update cluster
      command: >
        kops rolling-update cluster
        --name={{ cluster_name }}
        --state={{ kops_state_store }}
        --yes
      ignore_errors: true

    - name: Wait for cluster to be ready
      command: >
        kops validate cluster
        --name={{ cluster_name }}
        --state={{ kops_state_store }}
        --wait 15m

    - name: Export kubeconfig
      command: >
        kops export kubecfg
        --name={{ cluster_name }}
        --admin

    - name: Print OIDC issuer URL for Terraform IAM stack
      command: >
        kops get cluster {{ cluster_name }}
        --state={{ kops_state_store }}
        -o json
      register: cluster_info

    - name: Show next steps
      debug:
        msg: |
          Cluster ready. Get OIDC issuer and apply iam/ stack:
            kops get cluster {{ cluster_name }} --state={{ kops_state_store }} -o yaml | grep -A2 serviceAccountIssuerDiscovery
            export OIDC_ISSUER=https://{{ cluster_name }}
            cd infra-live/{{ environment }}/iam && OIDC_ISSUER=$OIDC_ISSUER make init plan apply
