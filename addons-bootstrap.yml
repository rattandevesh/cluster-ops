---
- name: Bootstrap Cluster Add-ons
  hosts: localhost
  gather_facts: false
  vars:
    environment: "{{ lookup('env', 'ENVIRONMENT') | default('dev', true) }}"
    cluster_name: "{{ lookup('env', 'CLUSTER_NAME') | default('dev.cluster.example.internal', true) }}"
    region: "{{ lookup('env', 'AWS_REGION') | default('us-east-1', true) }}"
    vpc_id: "{{ lookup('env', 'VPC_ID') }}"
    external_dns_role_arn: "{{ lookup('env', 'EXTERNAL_DNS_ROLE_ARN') }}"
    cert_manager_role_arn: "{{ lookup('env', 'CERT_MANAGER_ROLE_ARN') }}"
    cluster_autoscaler_role_arn: "{{ lookup('env', 'CLUSTER_AUTOSCALER_ROLE_ARN') }}"
    # kOps IRSA uses the same annotation key as EKS when OIDC is enabled
    irsa_annotation: "eks.amazonaws.com/role-arn"

  tasks:
    - name: Configure kubectl context
      command: >
        kops export kubecfg
        --name={{ cluster_name }}
        --admin

    - name: Add Helm repositories
      command: helm repo add {{ item.name }} {{ item.url }}
      loop:
        - { name: metrics-server, url: https://kubernetes-sigs.github.io/metrics-server/ }
        - { name: ingress-nginx, url: https://kubernetes.github.io/ingress-nginx }
        - { name: jetstack, url: https://charts.jetstack.io }
        - { name: external-secrets, url: https://charts.external-secrets.io }
        - { name: eks, url: https://aws.github.io/eks-charts }
        - { name: bitnami, url: https://charts.bitnami.com/bitnami }
        - { name: autoscaler, url: https://kubernetes.github.io/autoscaler }
      ignore_errors: true

    - name: Update Helm repositories
      command: helm repo update

    - name: Install Metrics Server
      command: >
        helm upgrade --install metrics-server metrics-server/metrics-server
        --namespace kube-system
        --set args[0]=--kubelet-insecure-tls

    - name: Install Amazon EKS Pod Identity Webhook (for kOps IRSA)
      command: >
        kubectl apply -f https://raw.githubusercontent.com/aws/amazon-eks-pod-identity-webhook/master/deploy/auth.yaml
      ignore_errors: true

    - name: Wait for Pod Identity Webhook to be ready
      command: >
        kubectl wait --for=condition=available --timeout=120s 
        deployment/pod-identity-webhook -n kube-system
      ignore_errors: true

    - name: Create Cluster Autoscaler Service Account with IRSA
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: v1
          kind: ServiceAccount
          metadata:
            name: cluster-autoscaler
            namespace: kube-system
            annotations:
              eks.amazonaws.com/role-arn: "{{ cluster_autoscaler_role_arn }}"

    - name: Install Cluster Autoscaler
      command: >
        helm upgrade --install cluster-autoscaler cluster-autoscaler
        --repo https://kubernetes.github.io/autoscaler
        --namespace kube-system
        --set autoDiscovery.clusterName={{ cluster_name }}
        --set awsRegion={{ region }}
        --set rbac.serviceAccount.create=false
        --set rbac.serviceAccount.name=cluster-autoscaler
        --set extraArgs.balance-similar-node-groups=true
        --set extraArgs.skip-nodes-with-system-pods=false
      ignore_errors: true

    - name: Create External DNS Service Account with IRSA
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: v1
          kind: ServiceAccount
          metadata:
            name: external-dns
            namespace: kube-system
            annotations:
              eks.amazonaws.com/role-arn: "{{ external_dns_role_arn }}"

    - name: Install External DNS
      command: >
        helm upgrade --install external-dns bitnami/external-dns
        --namespace kube-system
        --set provider=aws
        --set aws.zoneType=public
        --set serviceAccount.create=false
        --set serviceAccount.name=external-dns
        --set txtOwnerId={{ cluster_name }}
        --set policy=sync
      ignore_errors: true

    - name: Install NGINX Ingress Controller
      command: >
        helm upgrade --install ingress-nginx ingress-nginx/ingress-nginx
        --namespace ingress-nginx
        --create-namespace
        --set controller.service.annotations."service\.beta\.kubernetes\.io/aws-load-balancer-type"=nlb

    - name: Install AWS Load Balancer Controller
      command: >
        helm upgrade --install aws-load-balancer-controller aws-load-balancer-controller
        --repo https://aws.github.io/eks-charts
        --namespace kube-system
        --set clusterName={{ cluster_name }}
        --set serviceAccount.create=true
        --set serviceAccount.name=aws-load-balancer-controller
        --set region={{ region }}
        --set vpcId={{ vpc_id }}

    - name: Create cert-manager namespace
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: v1
          kind: Namespace
          metadata:
            name: cert-manager

    - name: Create Cert Manager Service Account with IRSA
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: v1
          kind: ServiceAccount
          metadata:
            name: cert-manager
            namespace: cert-manager
            annotations:
              eks.amazonaws.com/role-arn: "{{ cert_manager_role_arn }}"

    - name: Install CRDs for cert-manager
      command: >
        kubectl apply -f https://github.com/cert-manager/cert-manager/releases/download/v1.13.0/cert-manager.crds.yaml

    - name: Install cert-manager
      command: >
        helm upgrade --install cert-manager jetstack/cert-manager
        --namespace cert-manager
        --set installCRDs=false
        --set serviceAccount.create=false
        --set serviceAccount.name=cert-manager
        --version v1.13.0

    - name: Create Staging ClusterIssuer
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: cert-manager.io/v1
          kind: ClusterIssuer
          metadata:
            name: letsencrypt-staging
          spec:
            acme:
              server: https://acme-staging-v02.api.letsencrypt.org/directory
              email: admin@example.com
              privateKeySecretRef:
                name: letsencrypt-staging
              solvers:
                - dns01:
                    route53:
                      region: "{{ region }}"
                      hostedZoneID: "{{ lookup('env', 'HOSTED_ZONE_ID') }}"
      when: lookup('env', 'HOSTED_ZONE_ID') | length > 0
      ignore_errors: true

    - name: Create Production ClusterIssuer
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: cert-manager.io/v1
          kind: ClusterIssuer
          metadata:
            name: letsencrypt-prod
          spec:
            acme:
              server: https://acme-v02.api.letsencrypt.org/directory
              email: admin@example.com
              privateKeySecretRef:
                name: letsencrypt-prod
              solvers:
                - dns01:
                    route53:
                      region: "{{ region }}"
                      hostedZoneID: "{{ lookup('env', 'HOSTED_ZONE_ID') }}"
      when: lookup('env', 'HOSTED_ZONE_ID') | length > 0
      ignore_errors: true

    - name: Install External Secrets Operator
      command: >
        helm upgrade --install external-secrets external-secrets/external-secrets
        --namespace external-secrets
        --create-namespace
        --timeout 5m
      ignore_errors: true

    - name: Install Kyverno
      command: >
        kubectl apply -f https://github.com/kyverno/kyverno/releases/download/v1.11.0/install.yaml
      ignore_errors: true

    - name: Verify add-ons
      command: kubectl get pods -A
      register: pods

    - name: Display pod status
      debug:
        msg: "{{ pods.stdout_lines }}"
